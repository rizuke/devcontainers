name: Build node-pnpm devcontainer image

on:
  push:
    branches:
      - main
    paths:
      - images/node-pnpm/**
      - .github/workflows/build-node-pnpm.yml

  schedule:
    - cron: "0 3 * * 1"

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./images/node-pnpm
          file: ./images/node-pnpm/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest