name: Build node-pnpm devcontainer image

on:
  push:
    branches:
      - main
    paths:
      - images/node-pnpm/**
      - .github/workflows/build-node-pnpm.yml

  schedule:
    - cron: "0 3 * * 1"

  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag override'
        required: false
        default: 'latest'

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ./images/node-pnpm
          file: ./images/node-pnpm/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest