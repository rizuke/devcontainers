name: build/base-python

on:
  push:
    branches:
      - main
    paths:
      - images/base-python/**
      - .github/workflows/build-base-python.yaml

  workflow_run:
    workflows: ["build/base"]
    types:
      - completed

  schedule:
    - cron: "0 3 * * 1"

  workflow_dispatch:

jobs:
  build-and-push:
    uses: rizuke/.github/.github/workflows/build-docker-image.yaml@main
    with:
      image-name: base-python
      context: ./images/base-python
      dockerfile: ./images/base-python/Dockerfile
      multi-arch: true
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      packages: write